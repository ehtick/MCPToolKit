name: Release Package

on:
  push:
    tags:
      - "v*"
  pull_request:
    paths:
      - ".github/workflows/release-package.yml"
      - "CHANGELOG.md"
      - "Directory.Build.props"
      - "src/**"
      - "tests/**"
  workflow_dispatch:
    inputs:
      version:
        description: "Package version (examples: 1.1.0-preview.1 or 1.1.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  pack-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Resolve version and channel
        id: version
        shell: bash
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "push" ] && [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          elif [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="0.0.0-ci.${GITHUB_RUN_NUMBER}"
          fi

          if [[ "$VERSION" == *"-"* ]]; then
            PRERELEASE="true"
          else
            PRERELEASE="false"
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"

      - name: Validate changelog contains release version
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ] || [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            if ! grep -q "^## \[$VERSION\]" CHANGELOG.md; then
              echo "CHANGELOG.md is missing section: ## [$VERSION]"
              echo "Add the version section before publishing."
              exit 1
            fi
          else
            if ! grep -q "^## \[Unreleased\]" CHANGELOG.md; then
              echo "CHANGELOG.md is missing the required Unreleased section."
              exit 1
            fi
          fi

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: dotnet test --configuration Release --no-build --verbosity normal

      - name: Pack
        run: |
          dotnet pack src/AzureCosmosDB.MCP.Toolkit/AzureCosmosDB.MCP.Toolkit.csproj \
            --configuration Release \
            --no-build \
            -p:PackageVersion=${{ steps.version.outputs.version }} \
            --output ./artifacts/packages

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: nupkg-${{ steps.version.outputs.version }}
          path: artifacts/packages/*.nupkg

      - name: Create GitHub release
        if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          generate_release_notes: true
          prerelease: ${{ steps.version.outputs.prerelease }}
          files: |
            artifacts/packages/*.nupkg
